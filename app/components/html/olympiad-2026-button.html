<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympiad 2026 Button</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #F2F4F8;
    font-family: 'Oswald', sans-serif;
  }

  .olympiad-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 64px;
    padding: 0 44px;
    border: none;
    border-radius: 999px;
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: white;
    background: linear-gradient(180deg, #3B8BFF 0%, #0165FD 50%, #014BC4 100%);
    cursor: pointer;
    overflow: hidden;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.45) inset,
      0 -2px 0 rgba(0,0,0,0.18) inset,
      0 6px 18px rgba(1, 101, 253, 0.45);
    animation:
      btn-pulse 2s ease-in-out infinite,
      btn-breathe 2.4s ease-in-out infinite;
  }

  .olympiad-btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
      100deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.55) 50%,
      rgba(255,255,255,0) 100%
    );
    transform: skewX(-20deg);
    animation: btn-shine 3s ease-in-out infinite;
    pointer-events: none;
  }

  .olympiad-btn .star {
    position: absolute;
    color: rgba(255,255,255,0.95);
    pointer-events: none;
    animation: btn-twinkle 2s ease-in-out infinite;
    text-shadow: 0 0 6px rgba(255,255,255,0.6);
  }
  .olympiad-btn .star.s1 { top: 8px; right: 20px; font-size: 13px; animation-delay: 0s; }
  .olympiad-btn .star.s2 { bottom: 10px; left: 22px; font-size: 10px; animation-delay: 0.7s; }
  .olympiad-btn .star.s3 { top: 12px; left: 18%; font-size: 8px; animation-delay: 1.3s; }

  .olympiad-btn:hover { filter: brightness(1.08); }
  .olympiad-btn:active { filter: brightness(0.95); }

  @keyframes btn-pulse {
    0%, 100% {
      box-shadow:
        0 1px 0 rgba(255,255,255,0.45) inset,
        0 -2px 0 rgba(0,0,0,0.18) inset,
        0 6px 18px rgba(1, 101, 253, 0.45),
        0 0 0 0 rgba(1, 101, 253, 0.55);
    }
    50% {
      box-shadow:
        0 1px 0 rgba(255,255,255,0.45) inset,
        0 -2px 0 rgba(0,0,0,0.18) inset,
        0 8px 24px rgba(1, 101, 253, 0.6),
        0 0 0 10px rgba(1, 101, 253, 0);
    }
  }

  @keyframes btn-breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  @keyframes btn-shine {
    0% { left: -75%; }
    60%, 100% { left: 125%; }
  }

  @keyframes btn-twinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.25); }
  }
</style>
</head>
<body>
  <button class="olympiad-btn">
    OLYMPIAD 2026
    <span class="star s1">✦</span>
    <span class="star s2">✦</span>
    <span class="star s3">✦</span>
  </button>
</body>
</html>
